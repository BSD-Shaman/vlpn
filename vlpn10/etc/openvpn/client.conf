client
dev tun
proto udp
remote 94.141.110.106 55500

persist-key
persist-tun
keepalive	10 120
nobind

ca		client/vlpn.crt
cert		client/vlpn10.crt
key		client/vlpn10.key
auth-user-pass	client/vlpn10.login
askpass		client/vlpn10.pass
log		/var/log/ovpn.log

remote-cert-tls server
auth		SHA256
cipher		AES-256-GCM
data-ciphers	AES-256-GCM

verb 3

route 192.168.45.0 255.255.255.224 192.168.103.1
route 192.168.188.0 255.255.255.128 192.168.103.1
route 192.168.188.128 255.255.255.224 192.168.103.1
